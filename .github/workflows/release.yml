name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # gradle.properties may contain a developer-local org.gradle.java.home path.
      # Remove it so CI uses the JDK installed above.
      - name: Fix Gradle JVM path for CI
        shell: bash
        run: |
          awk '!/^org\.gradle\.java\.home=/' gradle.properties > gradle.properties.tmp
          mv gradle.properties.tmp gradle.properties

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        shell: bash
        run: chmod +x gradlew

      - name: Run tests
        shell: bash
        run: ./gradlew test

      - name: Build runnable artifacts
        shell: bash
        run: ./gradlew packageCurrentOsFatJar packageCurrentOsJarBundle packagePortableDistribution

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: purple-email-client-${{ matrix.name }}
          path: |
            build/release-jars/purple-email-client-*-*-*.jar
            build/distributions/purple-email-client-*-jar-bundle.zip
            build/distributions/purple-email-client-*-portable.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.jar
            release-assets/**/*.zip
          generate_release_notes: true
